        // Estado de filtro y búsqueda
        let currentFilter = 'todos';
        let searchTerm = '';

        // Código de referencia: 001, 002, 003...
        function productCode(p) {
            return String(p.id).padStart(3, '0');
        }

        // URL absoluta de la foto del producto
        function productPhotoUrl(p) {
            return 'http://antofagastafloreria.dondeseria.com/' + p.image.replace(/^\//, '');
        }

        // Normaliza texto para búsqueda sin tildes (u0300-u036f = acentos combinantes)
        function normalizeText(t) {
            return t.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
        }

        // Renderizar productos
        function renderProducts() {
            const filter = currentFilter;
            const grid = document.getElementById('products-grid');
            const emptyState = document.getElementById('empty-state');
            const resultsCount = document.getElementById('results-count');

            let filteredProducts = products;

            if (filter !== 'todos') {
                filteredProducts = products.filter(product =>
                    product.categories.includes(filter)
                );
            }

            // Búsqueda por nombre o código
            if (searchTerm.trim()) {
                const q = normalizeText(searchTerm.trim());
                filteredProducts = filteredProducts.filter(product =>
                    normalizeText(product.name).includes(q) ||
                    productCode(product).includes(q)
                );
            }

            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                emptyState.classList.add('active');
                resultsCount.textContent = '0';
                return;
            }

            grid.style.display = 'grid';
            emptyState.classList.remove('active');
            resultsCount.textContent = filteredProducts.length;

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" data-categories="${product.categories.join(' ')}">
                    <div class="product-image-container" onclick="openLightbox('${product.image}', '${product.name}', '${formatPrice(product.price)}')">
                        <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="zoom-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                                <line x1="11" y1="8" x2="11" y2="14"/>
                                <line x1="8" y1="11" x2="14" y2="11"/>
                            </svg>
                        </div>
                    </div>
                    <div class="product-info">
                        ${product.oldPrice ? `<div class="product-offer-badge">OFERTA</div>` : ''}
                        <div class="product-ref">Ref. ${productCode(product)}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div>
                                <span class="price-label ${product.oldPrice ? 'price-label-old' : ''}">${product.oldPrice ? formatPrice(product.oldPrice) : 'Desde'}</span>
                                <div class="product-price">${formatPrice(product.price)}</div>
                            </div>
                            <a href="https://wa.me/56968489196?text=${encodeURIComponent('Hola, me interesa el producto: ' + product.name + ' (Ref. ' + productCode(product) + ') - ' + formatPrice(product.price) + ' | Foto: ' + productPhotoUrl(product))}"
                               class="btn-order"
                               target="_blank">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                </svg>
                                Pedir Ahora
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Formatear precio
        function formatPrice(price) {
            return '$' + price.toLocaleString('es-CL');
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderProducts();
                window.scrollTo({ top: 400, behavior: 'smooth' });
            });
        });

        // Buscador por nombre o código
        document.getElementById('product-search').addEventListener('input', function() {
            searchTerm = this.value;
            renderProducts();
        });

        // Lightbox
        function openLightbox(image, name, price) {
            document.getElementById('lightbox-image').src = image;
            document.getElementById('lightbox-image').alt = name;
            document.getElementById('lightbox-title').textContent = name;
            document.getElementById('lightbox-price').textContent = price;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        // Botón volver arriba
        const scrollTopBtn = document.getElementById('scroll-top');
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 600) scrollTopBtn.classList.add('visible');
            else scrollTopBtn.classList.remove('visible');
        });
        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Render inicial
        renderProducts();
    </script>
